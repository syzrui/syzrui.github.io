
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 游戏创意</title>
<style>
:root {
  --color-border-primary: #d0d7de;
  --color-border-secondary: #d8dee4;
  --color-border-tertiary: #e6e8eb;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f6f8fa;
  --color-text-primary: #24292f;
  --color-text-secondary: #57606a;
  --border-radius-md: 6px;
  --border-radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary)}
.top{padding:1rem 0 0.75rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cat-btn{font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);transition:all 0.15s}
.cat-btn.on{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.info{font-size:12px;color:var(--color-text-secondary);padding:0 0 0.75rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;background:var(--color-background-primary);cursor:pointer}
.card:hover{border-color:var(--color-border-primary)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px}
.card-name{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.card-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.pager{display:flex;justify-content:center;align-items:center;gap:6px;padding:1rem 0;flex-wrap:wrap}
.pb{font-size:13px;padding:5px 12px;cursor:pointer;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.pb:disabled{opacity:0.35;cursor:default}
.pb.cur{font-weight:500;border-color:var(--color-border-primary)}
.pi{font-size:13px;color:var(--color-text-secondary)}
.overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:10;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.overlay.open{display:flex}
.modal{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;max-width:480px;width:100%;position:relative;margin-top:2rem}
.mc{position:absolute;top:10px;right:12px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--color-text-secondary)}
.mh{font-size:16px;font-weight:500;margin-bottom:8px}
.mm{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.md{font-size:14px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:10px}
.ml{font-size:13px;font-weight:500;margin-bottom:5px}
.mtags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.mtag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.send-btn{width:100%}
</style>

<body>
<div style="position:relative" id="root">
<div class="top" id="cats"></div>
<div class="info" id="info"></div>
<div class="grid" id="grid"></div>
<div class="pager" id="pager"></div>
<div class="overlay" id="overlay" onclick="if(event.target===this)close()">
  <div class="modal">
    <button class="mc" onclick="close()">✕</button>
    <div class="mh" id="mh"></div>
    <div class="mm"><span class="badge" id="mb"></span><span style="font-size:12px;color:var(--color-text-secondary)" id="md2"></span></div>
    <p class="md" id="md"></p>
    <p class="ml">核心机制</p>
    <p class="md" id="mm2"></p>
    <div class="mtags" id="mt"></div>
    <button class="send-btn" onclick="send()">↗ 帮我展开设计这个游戏</button>
  </div>
</div>
</div>

const PAGE=30;
let cur="全部",page=1,sel=null;
let list=[...D];

function cats(){
  const all=["全部",...Object.keys(CATS)];
  document.getElementById("cats").innerHTML=all.map(c=>`<button class="cat-btn${c===cur?" on":""}" onclick="setC('${c}')">${c}</button>`).join("");
}

function setC(c){cur=c;page=1;list=c==="全部"?[...D]:D.filter(x=>x.cat===c);render();}

function render(){
  cats();
  const tot=list.length,tp=Math.ceil(tot/PAGE)||1;
  const s=(page-1)*PAGE,sl=list.slice(s,s+PAGE);
  document.getElementById("info").textContent=`共 ${tot} 个创意 · 第 ${page}/${tp} 页`;
  document.getElementById("grid").innerHTML=sl.map(x=>{
    const c=CATS[x.cat];
    return`<div class="card" onclick="show(${x.id})">
      <div class="card-top">
        <span class="card-name">#${x.id} ${x.name}</span>
        <span class="badge" style="background:${c.bg};color:${c.tx}">${x.cat}</span>
      </div>
      <div class="card-desc">${x.desc}</div>
    </div>`;
  }).join("");

  const pg=document.getElementById("pager");
  if(tp<=1){pg.innerHTML="";return;}
  let h=`<button class="pb" onclick="go(${page-1})" ${page===1?"disabled":""}>上一页</button>`;
  const r=[];for(let i=Math.max(1,page-2);i<=Math.min(tp,page+2);i++)r.push(i);
  if(r[0]>1)h+=`<button class="pb" onclick="go(1)">1</button>${r[0]>2?'<span class="pi">…</span>':""}`;
  h+=r.map(i=>`<button class="pb${i===page?" cur":""}" onclick="go(${i})">${i}</button>`).join("");
  if(r[r.length-1]<tp)h+=`${r[r.length-1]<tp-1?'<span class="pi">…</span>':""}
<button class="pb" onclick="go(${tp})">${tp}</button>`;
  h+=`<button class="pb" onclick="go(${page+1})" ${page===tp?"disabled":""}>下一页</button>`;
  pg.innerHTML=h;
}

function go(p){const tp=Math.ceil(list.length/PAGE)||1;page=Math.max(1,Math.min(p,tp));render();document.getElementById("root").scrollIntoView({behavior:"smooth"});}

function show(id){
  sel=D.find(x=>x.id===id);if(!sel)return;
  const c=CATS[sel.cat];
  document.getElementById("mh").textContent=`#${sel.id} ${sel.name}`;
  const mb=document.getElementById("mb");mb.textContent=sel.cat;mb.style.background=c.bg;mb.style.color=c.tx;
  document.getElementById("md2").textContent=`难度：${sel.diff}`;
  document.getElementById("md").textContent=sel.desc;
  document.getElementById("mm2").textContent=sel.mech;
  document.getElementById("mt").innerHTML=sel.tags.map(t=>`<span class="mtag">${t}</span>`).join("");
  document.getElementById("overlay").classList.add("open");
}

function close(){document.getElementById("overlay").classList.remove("open");}

function send(){
  if(!sel)return;
  close();
  sendPrompt(`帮我详细展开设计这个网页游戏：#${sel.id}《${sel.name}》——${sel.desc}。请给出：核心玩法设计、PC和移动端适配方案、技术选型（Canvas/CSS/WebGL等）、界面布局草图、难度曲线设计、可能的变体玩法。`);
}

render();
</script>
