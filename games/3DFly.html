<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>极境漂移 3D - Zenith Drift</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #0ff;
            font-size: 24px; text-shadow: 0 0 10px #0ff; pointer-events: none;
        }
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; text-align: center; display: none; background: rgba(0,0,0,0.8);
            padding: 20px; border: 2px solid #0ff; border-radius: 10px;
        }
        button {
            padding: 10px 20px; background: #0ff; border: none; cursor: pointer;
            font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="ui">分数: <span id="score">0</span></div>
    <div id="msg">
        <h1 id="status">游戏结束</h1>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">重新开始</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 核心变量 ---
        let scene, camera, renderer, player;
        let score = 0;
        let isGameOver = false;
        let obstacles = [];
        let speed = 0.5;
        let targetPos = { x: 0, y: 0 };

        // --- 初始化场景 ---
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 光影
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x00ffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            // 创建玩家（发光球体）
            const geometry = new THREE.SphereGeometry(0.3, 32, 32);
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x00ffff, 
                emissive: 0x00ffff, 
                emissiveIntensity: 0.5 
            });
            player = new THREE.Mesh(geometry, material);
            scene.add(player);

            // 星空背景
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<5000; i++) {
                starCoords.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            const starMat = new THREE.PointsMaterial({ color: 0x888888, size: 0.1 });
            scene.add(new THREE.Points(starGeo, starMat));

            setupControls();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // --- 响应式控制 ---
        function setupControls() {
            // PC 鼠标
            window.addEventListener('mousemove', (e) => {
                if(isGameOver) return;
                targetPos.x = (e.clientX / window.innerWidth - 0.5) * 10;
                targetPos.y = -(e.clientY / window.innerHeight - 0.5) * 6;
            });

            // 手机重力感应
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 需要权限授权
                document.body.addEventListener('click', () => {
                    DeviceOrientationEvent.requestPermission();
                }, { once: true });
            }
            
            window.addEventListener('deviceorientation', (e) => {
                if(isGameOver) return;
                // gamma 左右倾斜 [-90, 90], beta 前后倾斜 [-180, 180]
                targetPos.x = (e.gamma / 30) * 5; 
                targetPos.y = ((e.beta - 45) / 30) * 3; // 假设用户握持角度为45度
            });
        }

        // --- 障碍物生成 ---
		function createObstacle() {
			const size = Math.random() * 1 + 0.5;
			const geometry = new THREE.BoxGeometry(size, size, size);
			const material = new THREE.MeshPhongMaterial({ 
				color: 0xff0055,
				emissive: 0xff0000,
				emissiveIntensity: 0.2
			});
			const mesh = new THREE.Mesh(geometry, material);
			
			// --- 修复逻辑：让障碍物更有威胁 ---
			// 50% 的概率障碍物会直接出现在中心点附近 (原点 Bug 修复)
			if (Math.random() > 0.5) {
				mesh.position.x = (Math.random() - 0.5) * 4; // 较窄的中心范围
				mesh.position.y = (Math.random() - 0.5) * 4;
			} else {
				mesh.position.x = (Math.random() - 0.5) * 15; // 较宽的外围范围
				mesh.position.y = (Math.random() - 0.5) * 10;
			}
			
			mesh.position.z = -60; // 生成在更远的地方，给玩家反应时间
			
			scene.add(mesh);
			obstacles.push(mesh);
		}

        // --- 游戏循环 ---
        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
			
			// 在 animate 函数内加入
			// 限制玩家活动范围，并让视角随移动倾斜
			player.position.x = THREE.MathUtils.clamp(player.position.x, -7, 7);
			player.position.y = THREE.MathUtils.clamp(player.position.y, -4, 4);

			// 增加一种“收缩感”：分数越高，障碍物越往中心靠
			let squeeze = Math.min(score * 0.01, 2); 
			// 在 createObstacle 里使用这个 squeeze 变量来减少随机范围

            // 玩家平滑跟随 (线性插值)
            player.position.x += (targetPos.x - player.position.x) * 0.1;
            player.position.y += (targetPos.y - player.position.y) * 0.1;
            
            // 相机轻微跟随偏移，增加动感
            camera.position.x = player.position.x * 0.5;
            camera.position.y = player.position.y * 0.5;

            // 障碍物逻辑
            if (Math.random() < 0.05 + (score * 0.001)) createObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obj = obstacles[i];
                obj.position.z += speed + (score * 0.005); // 随分数增加速度
                obj.rotation.x += 0.02;
                obj.rotation.y += 0.02;

                // 碰撞检测 (球体中心距离判断)
                const dist = player.position.distanceTo(obj.position);
                if (dist < 0.6) {
                    endGame();
                }

                // 移除飞出屏幕的障碍物
                if (obj.position.z > 5) {
                    scene.remove(obj);
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById('score').innerText = score;
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('msg').style.display = 'block';
            document.getElementById('finalScore').innerText = score;
        }

        window.resetGame = function() {
            score = 0;
            isGameOver = false;
            speed = 0.5;
            document.getElementById('score').innerText = "0";
            document.getElementById('msg').style.display = 'none';
            
            // 清理旧障碍物
            obstacles.forEach(obj => scene.remove(obj));
            obstacles = [];
            player.position.set(0, 0, 0);
            animate();
        }

        init();
    </script>
</body>
</html>
