<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>P3 专业级 HDR 卷积着色引擎</title>
    <style>
        :root { --bg: #09090b; --panel: #18181b; --accent: #f4f4f5; }
        body { background: var(--bg); color: #fff; font-family: system-ui, -apple-system; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .wrapper { width: 90vw; max-width: 1200px; }
        .view-frame { width: 100%; border-radius: 20px; border: 2px dashed #3f3f46; min-height: 50vh; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        canvas { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .controls { background: var(--panel); border-radius: 16px; margin-top: 20px; padding: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .control-item { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 13px; text-transform: uppercase; color: #a1a1aa; letter-spacing: 1px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: #27272a; height: 6px; border-radius: 3px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 4px solid var(--panel); }
        .btn-group { grid-column: 1 / -1; display: flex; gap: 15px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-up { background: #fff; color: #000; }
        .btn-up:hover { background: #e4e4e7; }
        .btn-dl { background: #27272a; color: #a1a1aa; }
        .btn-dl:not(:disabled) { background: #f43f5e; color: #fff; }
        .btn-dl:not(:disabled):hover { background: #e11d48; }
        .btn-dl:disabled { cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="view-frame">
        <canvas id="cvs"></canvas>
    </div>

    <div class="controls">
        <div class="control-item">
            <label>暗部局部对比度 (暗部着色层)</label>
            <input type="range" id="local" min="0" max="200" value="80">
        </div>
        <div class="control-item">
            <label>高光爆发系数 (通透感)</label>
            <input type="range" id="peak" min="100" max="300" value="130">
        </div>
        <div class="btn-group">
            <input type="file" id="f_in" hidden accept="image/*">
            <button class="btn-up" onclick="document.getElementById('f_in').click()">导入高码率照片</button>
            <button class="btn-dl" id="f_out" disabled>导出高品质 P3 PNG</button>
        </div>
    </div>
</div>

<script>
    const cvs = document.getElementById('cvs');
    // 强制使用 Display P3 色彩空间，拒绝 sRGB 假色彩
    const ctx = cvs.getContext('2d', { colorSpace: 'display-p3' });
    let rawImg = null;

    document.getElementById('f_in').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                rawImg = img;
                cvs.width = img.width;
                cvs.height = img.height;
                process();
                document.getElementById('f_out').disabled = false;
            };
            img.src = ev.target.result;
        };
        r.readAsDataURL(e.target.files[0]);
    };

    [local, peak].forEach(s => s.oninput = process);

    // 卷积模糊函数：用于提取“局部区域平均亮度”
    function blur(pixels, w, h) {
        const dst = new Float32Array(w * h);
        const kernel = [
            1/9, 1/9, 1/9,
            1/9, 1/9, 1/9,
            1/9, 1/9, 1/9
        ];
        // 简单 3x3 均值卷积
        for (let y = 1; y < h - 1; y++) {
            for (let x = 1; x < w - 1; x++) {
                let sum = 0;
                for (let ky = -1; ky <= 1; ky++) {
                    for (let kx = -1; kx <= 1; kx++) {
                        sum += pixels[(y+ky)*w + (x+kx)] * kernel[(ky+1)*3+(kx+1)];
                    }
                }
                dst[y*w + x] = sum;
            }
        }
        return dst;
    }

    function process() {
        if (!rawImg) return;
        ctx.drawImage(rawImg, 0, 0);
        
        const w = cvs.width;
        const h = cvs.height;
        const imgData = ctx.getImageData(0, 0, w, h, { colorSpace: 'display-p3' });
        const data = imgData.data;

        const p_local = document.getElementById('local').value / 100;
        const p_peak = document.getElementById('peak').value / 100;

        // 创建临时数组处理亮度层
        const lumaArray = new Float32Array(w * h);
        
        for (let i = 0; i < data.length; i += 4) {
            // 计算 P3 亮度
            lumaArray[i/4] = (0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2]) / 255;
        }

        // 核心步骤 1：生成局部平均亮度层（模糊处理）
        const localLumaArray = blur(lumaArray, w, h);

        // 核心步骤 2：应用高级着色公式
        for (let i = 0; i < data.length; i += 4) {
            const idx = i / 4;
            let r = data[i] / 255;
            let g = data[i+1] / 255;
            let b = data[i+2] / 255;
            const luma = lumaArray[idx];
            const localLuma = localLumaArray[idx];

            // A. 局部对比度增强（暗部着色层）：
            // 原理：如果当前像素比周围暗，就让它更暗；比周围亮，就让它更亮。
            // 公式：L_new = L + Intensity * (L - L_local_average)
            const diff = luma - localLuma;
            let enhancedLuma = luma + diff * p_local;

            // B. 高光处理：
            // 使用非线性指数，对增强后的高光部分进行再拉伸，形成爆发感
            if (enhancedLuma > 0.5) {
                enhancedLuma = Math.pow(enhancedLuma, p_peak);
            }

            // C. 重新着色：保持色相，应用新的亮度
            const scale = Math.max(0, enhancedLuma) / (luma + 0.0001);
            
            // D. 应用 Display P3 的厚重色彩增益
            data[i]   = Math.max(0, Math.min(255, r * scale * 255 * 1.05)); // 稍微加强红色通道
            data[i+1] = Math.max(0, Math.min(255, g * scale * 255 * 1.02)); 
            data[i+2] = Math.max(0, Math.min(255, b * scale * 255));
        }
        ctx.putImageData(imgData, 0, 0);
    }

    document.getElementById('f_out').onclick = () => {
        // 虽然导出的只是 SDR PNG，但在 P3 色域下进行过卷积着色，品质极高
        const lnk = document.createElement('a');
        lnk.download = `HDR_Convolution_P3_${Date.now()}.png`;
        lnk.href = cvs.toDataURL('image/png', 1.0);
        lnk.click();
    };
</script>
</body>
</html>
