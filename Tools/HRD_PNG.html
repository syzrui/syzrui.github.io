<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HDR 专业着色工具 (含ICC配置)</title>
    <style>
        :root { --accent: #00f2fe; }
        body { font-family: system-ui; background: #0f0f0f; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 1100px; width: 100%; background: #1a1a1a; padding: 30px; border-radius: 16px; border: 1px solid #333; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 30px; }
        .control-group { background: #252525; padding: 15px; border-radius: 8px; }
        label { display: block; margin-bottom: 10px; font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .preview-container { background: #000; border-radius: 12px; overflow: hidden; position: relative; min-height: 500px; display: flex; justify-content: center; align-items: center; border: 1px solid #333; }
        canvas { max-width: 100%; max-height: 75vh; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .actions { margin-top: 25px; display: flex; gap: 15px; justify-content: center; }
        button { padding: 12px 30px; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #000; }
        .btn-success { background: #28a745; color: white; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        button:disabled { background: #444; color: #777; transform: none; }
        .info-tag { font-size: 12px; color: #4facfe; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; margin-top:0;">HDR 专业着色引擎</h1>
    
    <div class="controls">
        <div class="control-group">
            <label>动态范围强度 (Real HDR)</label>
            <input type="range" id="hdrPower" min="0" max="200" value="100">
        </div>
        <div class="control-group">
            <label>暗部着色补偿</label>
            <input type="range" id="shadows" min="0" max="100" value="20">
        </div>
        <div class="control-group">
            <label>P3 色域饱和度</label>
            <input type="range" id="p3Sat" min="50" max="150" value="110">
        </div>
    </div>

    <div class="preview-container">
        <canvas id="mainCanvas"></canvas>
        <p id="dropText">将高码率照片拖入此处</p>
    </div>

    <div class="actions">
        <input type="file" id="loader" hidden accept="image/*">
        <button class="btn-primary" onclick="document.getElementById('loader').click()">导入原图</button>
        <button class="btn-success" id="exportBtn" disabled>导出含ICC的PNG文件</button>
    </div>
    <div class="info-tag">当前状态：支持 Display-P3 色彩管理 | 导出格式：PNG-24 (Managed ICC)</div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    // 关键：启用显式的色彩管理空间
    const ctx = canvas.getContext('2d', { 
        colorSpace: 'display-p3', 
        willReadFrequently: true 
    });
    
    let sourceImg = null;

    document.getElementById('loader').onchange = (e) => {
        const file = e.target.files[0];
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
            sourceImg = img;
            canvas.width = img.width;
            canvas.height = img.height;
            document.getElementById('dropText').style.display = 'none';
            render();
            document.getElementById('exportBtn').disabled = false;
        };
        img.src = url;
    };

    const sliders = ['hdrPower', 'shadows', 'p3Sat'];
    sliders.forEach(id => {
        document.getElementById(id).oninput = render;
    });

    function render() {
        if (!sourceImg) return;

        // 1. 绘制初始帧（在 P3 空间运行）
        ctx.drawImage(sourceImg, 0, 0);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height, { colorSpace: 'display-p3' });
        const data = imgData.data;

        const hdr = document.getElementById('hdrPower').value / 100;
        const shadowBoost = document.getElementById('shadows').value / 100;
        const sat = document.getElementById('p3Sat').value / 100;

        for (let i = 0; i < data.length; i += 4) {
            let r = data[i] / 255;
            let g = data[i+1] / 255;
            let b = data[i+2] / 255;

            // 亮度提取
            const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;

            // 2. 真实 HDR 曲线映射 (Reinhard Tone Mapping 变体)
            // 不只是改亮度，而是对高光进行非线性压缩，给暗部“着色”
            let mappedLum = lum * (1 + lum * hdr) / (1 + lum);
            
            // 3. 暗部细节增强 (Shadow Lifting)
            if (lum < 0.3) {
                mappedLum += (0.3 - lum) * shadowBoost;
            }

            const scale = mappedLum / (lum + 0.0001);
            r *= scale;
            g *= scale;
            b *= scale;

            // 4. 色彩空间校准 (Color Saturation in P3)
            const average = (r + g + b) / 3;
            r = average + (r - average) * sat;
            g = average + (g - average) * sat;
            b = average + (b - average) * sat;

            // 回填并限幅
            data[i] = Math.max(0, Math.min(255, r * 255));
            data[i+1] = Math.max(0, Math.min(255, g * 255));
            data[i+2] = Math.max(0, Math.min(255, b * 255));
        }

        ctx.putImageData(imgData, 0, 0);
    }

    // 5. 导出逻辑：保持色彩配置文件
    document.getElementById('exportBtn').onclick = () => {
        // 在支持 P3 的浏览器中，toBlob 会根据 context 的 colorSpace 写入相应的色彩标签
        canvas.toBlob((blob) => {
            const link = document.createElement('a');
            link.download = `Professional_HDR_P3_${Date.now()}.png`;
            link.href = URL.createObjectURL(blob);
            link.click();
        }, 'image/png');
    };
</script>

</body>
</html>
