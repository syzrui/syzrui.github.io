<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>专业级 HDR 增强工具</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 1000px; width: 100%; background: #2a2a2a; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; padding: 15px; background: #333; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 14px; color: #bbb; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .preview-area { position: relative; width: 100%; min-height: 400px; border: 2px dashed #444; border-radius: 8px; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #111; }
        canvas { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-upload { background: #007bff; color: white; }
        .btn-download { background: #28a745; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>HDR 真实色调映射工具</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>HDR 强度 (细节增强)</label>
            <input type="range" id="hdrIntensity" min="0" max="100" value="50">
        </div>
        <div class="control-group">
            <label>曝光度 (非线性亮度)</label>
            <input type="range" id="brightness" min="-100" max="100" value="0">
        </div>
        <div class="control-group">
            <label>饱和度补偿</label>
            <input type="range" id="saturation" min="0" max="200" value="110">
        </div>
    </div>

    <div class="preview-area" id="dropZone">
        <p id="placeholder">点击上传或拖入照片</p>
        <canvas id="canvas"></canvas>
    </div>

    <div class="btn-group">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">导入照片</button>
        <button class="btn-download" id="downloadBtn" disabled>导出 PNG</button>
    </div>
    <div id="status">算法说明：基于亮度分量(Luminance)提取，执行动态范围压缩与局部对比度映射。</div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const fileInput = document.getElementById('fileInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const hdrSlider = document.getElementById('hdrIntensity');
    const brightSlider = document.getElementById('brightness');
    const satSlider = document.getElementById('saturation');

    let originalImage = null;

    // 导入图片
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                originalImage = img;
                canvas.width = img.width;
                canvas.height = img.height;
                document.getElementById('placeholder').style.display = 'none';
                processImage();
                downloadBtn.disabled = false;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    // 实时监听滑块
    [hdrSlider, brightSlider, satSlider].forEach(slider => {
        slider.oninput = () => {
            if (originalImage) processImage();
        };
    });

    function processImage() {
        if (!originalImage) return;

        // 绘制原图
        ctx.drawImage(originalImage, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        const hdr = hdrSlider.value / 100;
        const bright = brightSlider.value / 100;
        const sat = satSlider.value / 100;

        for (let i = 0; i < data.length; i += 4) {
            let r = data[i];
            let g = data[i + 1];
            let b = data[i + 2];

            // 1. 计算亮度 (基于人眼感知的加权平均)
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b);

            // 2. HDR 核心算法：色调映射
            // 使用非线性曲线拉伸暗部，压缩高光
            // L' = L * (1 + L/white^2) / (1 + L)
            let factor = (luminance / 255);
            let hdrEffect = Math.pow(factor, 1 - hdr); // 伽马矫正模拟
            
            // 3. 亮度调节 (非线性)
            let bFactor = bright > 0 ? (1 + bright) : (1 + bright * 0.8);
            
            r *= (hdrEffect / factor) * bFactor;
            g *= (hdrEffect / factor) * bFactor;
            b *= (hdrEffect / factor) * bFactor;

            // 4. 饱和度补偿
            // 防止亮度提升导致的色彩发灰
            const gray = 0.2989 * r + 0.5870 * g + 0.1140 * b;
            r = gray + (r - gray) * sat;
            g = gray + (g - gray) * sat;
            b = gray + (b - gray) * sat;

            // 5. 溢出保护
            data[i] = Math.min(255, Math.max(0, r));
            data[i + 1] = Math.min(255, Math.max(0, g));
            data[i + 2] = Math.min(255, Math.max(0, b));
        }

        ctx.putImageData(imageData, 0, 0);
    }

    // 导出 PNG
    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = `HDR_Enhanced_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
